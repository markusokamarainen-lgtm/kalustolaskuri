<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ajoneuvoseuranta</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .btn { display: block; width: 100%; padding: 20px; margin: 10px 0; font-size: 20px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; }
        .reset-btn { background-color: #ffcccc; color: red; border: 1px solid red; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; font-size: 18px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body onload="updateCounts()">
    <h3>Ajoneuvoseuranta</h3>
    <input type="text" id="alue" placeholder="Kirjoita aluetunnus (esim. A1)">
    
    <div id="buttons"></div>
    
    <button class="btn reset-btn" onclick="clearUI()">Tyhjennä tunnuskenttä</button>
    <button class="btn" onclick="resetAll()">Nollaa näytön laskurit</button>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxaVaYEdwgyLRXpsZ24B4AcTf7oXTblq6dbZ-Jj75n0eNZN2vR8QF_1hFvrdH-Eyb925Q/exec';
        const types = ["AV", "AA", "T", "A", "ASLA"];

        async function updateCounts() {
            try {
                const r = await fetch(WEB_APP_URL);
                const data = await r.json();
                let html = "";
                types.forEach(t => {
                    html += `<button class="btn" onclick="log(this, '${t}')">${t} 
                             (<span class="count">${data[t] || 0}</span>)</button>`;
                });
                document.getElementById('buttons').innerHTML = html;
            } catch(e) {
                document.getElementById('buttons').innerHTML = "Virhe latauksessa";
            }
        }

        async function log(btn, tyyppi) {
            const alue = document.getElementById('alue').value;
            const span = btn.querySelector('.count');
            span.innerText = parseInt(span.innerText) + 1;

            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                body: JSON.stringify({ ajoneuvo: tyyppi, alue: alue }) 
            });
            updateCounts();
        }

        function clearUI() {
            if (confirm("Haluatko varmasti tyhjentää aluetunnuksen?")) {
                document.getElementById('alue').value = "";
            }
        }

        async function resetAll() {
            if (confirm("Nollataanko laskurit ja lisätään nollausrivi taulukkoon?")) {
                await fetch(WEB_APP_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ command: "RESET" }) 
                });
                updateCounts();
            }
        }
    </script>
</body>
</html>
