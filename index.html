<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ajoneuvoseuranta</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .btn { display: block; width: 100%; padding: 20px; margin: 10px 0; font-size: 20px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; }
        .reset-btn { background-color: #ffcccc; color: red; border: 1px solid red; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; font-size: 18px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>
    <h3>Ajoneuvoseuranta</h3>
    <input type="text" id="kayttaja" placeholder="Oma nimi (pakollinen)">
    <input type="text" id="alue" placeholder="Aluetunnus (esim. A2)">
    
    <div id="buttons"></div>
    
    <button class="btn reset-btn" onclick="resetUser()">Nollaa omat laskurit</button>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzVq7ZGYi-8s1s2i7NJluzs6lsPzr0v0ma-vsTBdIrposCMns18y4I5bH5w5tTOWjj_Cg/exec';
        const types = ["AV", "AA", "T", "A", "ASLA"];

        // Päivitä automaattisesti kun nimeä kirjoitetaan
        document.getElementById('kayttaja').addEventListener('input', updateCounts);

        async function updateCounts() {
            const user = document.getElementById('kayttaja').value;
            if(!user) { document.getElementById('buttons').innerHTML = ""; return; }
            
            const r = await fetch(WEB_APP_URL + "?user=" + encodeURIComponent(user));
            const data = await r.json();
            
            let html = "";
            types.forEach(t => {
                html += `<button class="btn" onclick="log(this, '${t}')">${t} 
                         (<span class="count">${data[t] || 0}</span>)</button>`;
            });
            document.getElementById('buttons').innerHTML = html;
        }

        async function log(btn, tyyppi) {
            const user = document.getElementById('kayttaja').value;
            const alue = document.getElementById('alue').value;
            if(!user) { alert("Kirjoita nimesi ensin!"); return; }

            const span = btn.querySelector('.count');
            span.innerText = parseInt(span.innerText) + 1;

            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                body: JSON.stringify({ ajoneuvo: tyyppi, alue: alue, user: user }) 
            });
        }

        async function resetUser() {
            const user = document.getElementById('kayttaja').value;
            if(!user) return;
            if (confirm("Nollataanko käyttäjän " + user + " laskurit?")) {
                await fetch(WEB_APP_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ command: "RESET_USER", user: user }) 
                });
                updateCounts();
            }
        }
    </script>
</body>
</html>
